openapi: "3.0.3"
info:
  title: GramSathi AI API
  description: |
    AI-Powered Multilingual Government Assistant API for rural citizens in India.
    Enables scheme discovery, application processing, document OCR, grievance filing,
    notifications, and analytics across 22 Indian languages.
  version: "1.0.0"
  contact:
    name: GramSathi Team
    email: dev@gramsathi.ai
  license:
    name: Proprietary

servers:
  - url: https://api.gramsathi.ai/v1
    description: Production server
  - url: https://staging-api.gramsathi.ai/v1
    description: Staging server
  - url: http://localhost:8001/api/v1
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token obtained from /auth/otp/verify

  schemas:
    # Common
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Error message
        request_id:
          type: string
          format: uuid
          description: Unique request identifier for tracing
      required:
        - detail

    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20

    # Auth Schemas
    OTPSendRequest:
      type: object
      required:
        - mobile_number
      properties:
        mobile_number:
          type: string
          pattern: "^\\+?[1-9]\\d{9,14}$"
          example: "+919876543210"
          description: Mobile number with country code
    OTPSendResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "OTP sent successfully"
        expires_in:
          type: integer
          example: 300
        debug_otp:
          type: string
          nullable: true
          description: OTP value in development mode only
    OTPVerifyRequest:
      type: object
      required:
        - mobile_number
        - otp
      properties:
        mobile_number:
          type: string
          pattern: "^\\+?[1-9]\\d{9,14}$"
          example: "+919876543210"
        otp:
          type: string
          minLength: 4
          maxLength: 8
          example: "123456"
    OTPVerifyResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          example: 900
        user:
          $ref: "#/components/schemas/UserOut"
    TokenRefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    TokenRefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    UserOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mobile_number:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [citizen, admin, super_admin]
        is_verified:
          type: boolean
        preferred_language:
          type: string
          example: "hi"
        created_at:
          type: string
          format: date-time
    UserUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        preferred_language:
          type: string
          maxLength: 10
        role:
          type: string
          enum: [citizen, admin, super_admin]
        is_active:
          type: boolean
    PaginatedUsers:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserOut"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer

    # Citizen Schemas
    CitizenOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, transgender, other]
        mobile_number:
          type: string
        state:
          type: string
        district:
          type: string
        tehsil:
          type: string
        village:
          type: string
        caste_category:
          type: string
          enum: [general, obc, sc, st, ews]
        annual_income:
          type: number
        occupation:
          type: string
        education_level:
          type: string
        aadhaar_hash:
          type: string
          description: SHA-256 hash of Aadhaar number
        preferred_language:
          type: string
        has_disability:
          type: boolean
        disability_type:
          type: string
          nullable: true
        is_bpl:
          type: boolean
        is_farmer:
          type: boolean
        created_at:
          type: string
          format: date-time
    CitizenUpdate:
      type: object
      properties:
        name:
          type: string
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, transgender, other]
        state:
          type: string
        district:
          type: string
        tehsil:
          type: string
        village:
          type: string
        caste_category:
          type: string
          enum: [general, obc, sc, st, ews]
        annual_income:
          type: number
        occupation:
          type: string
        education_level:
          type: string
        preferred_language:
          type: string
        has_disability:
          type: boolean
        disability_type:
          type: string
          nullable: true
        is_farmer:
          type: boolean
    CitizenSummary:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/CitizenOut"
        active_applications_count:
          type: integer
        pending_documents_count:
          type: integer
    FamilyMemberCreate:
      type: object
      required:
        - name
        - relationship
      properties:
        name:
          type: string
          maxLength: 200
        relationship:
          type: string
          enum: [spouse, child, parent, sibling, other]
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, transgender, other]
        occupation:
          type: string
        annual_income:
          type: number
    FamilyMemberOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        citizen_id:
          type: string
          format: uuid
        name:
          type: string
        relationship:
          type: string
        date_of_birth:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
        occupation:
          type: string
          nullable: true
        annual_income:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time

    # Scheme Schemas
    SchemeOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        name_hindi:
          type: string
        description:
          type: string
        description_hindi:
          type: string
        category:
          type: string
        ministry:
          type: string
        department:
          type: string
        state_specific:
          type: string
          nullable: true
        eligibility_criteria:
          type: object
        benefits:
          type: string
        required_documents:
          type: array
          items:
            type: string
        application_process:
          type: string
        tags:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SchemeCreate:
      type: object
      required:
        - name
        - description
        - category
        - ministry
      properties:
        name:
          type: string
        name_hindi:
          type: string
        description:
          type: string
        description_hindi:
          type: string
        category:
          type: string
        ministry:
          type: string
        department:
          type: string
        state_specific:
          type: string
          nullable: true
        eligibility_criteria:
          type: object
        benefits:
          type: string
        required_documents:
          type: array
          items:
            type: string
        application_process:
          type: string
        tags:
          type: array
          items:
            type: string
    SchemeUpdate:
      type: object
      properties:
        name:
          type: string
        name_hindi:
          type: string
        description:
          type: string
        description_hindi:
          type: string
        category:
          type: string
        ministry:
          type: string
        department:
          type: string
        state_specific:
          type: string
          nullable: true
        eligibility_criteria:
          type: object
        benefits:
          type: string
        required_documents:
          type: array
          items:
            type: string
        application_process:
          type: string
        tags:
          type: array
          items:
            type: string
        is_active:
          type: boolean
    SchemeMatch:
      type: object
      properties:
        scheme:
          $ref: "#/components/schemas/SchemeOut"
        match_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        explanation:
          type: string
    CategoryOut:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
    EligibilityCheckRequest:
      type: object
      required:
        - citizen_id
        - scheme_id
      properties:
        citizen_id:
          type: string
          format: uuid
        scheme_id:
          type: string
          format: uuid
    EligibilityCheckResult:
      type: object
      properties:
        eligible:
          type: boolean
        score:
          type: number
          format: float
        breakdown:
          type: object
        missing_requirements:
          type: array
          items:
            type: string
    EligibilityRequest:
      type: object
      required:
        - citizen_id
        - scheme_id
      properties:
        citizen_id:
          type: string
          format: uuid
        scheme_id:
          type: string
          format: uuid
    EligibilityResponse:
      type: object
      properties:
        eligible:
          type: boolean
        score:
          type: number
          format: float
        breakdown:
          type: object
        missing_requirements:
          type: array
          items:
            type: string
    BatchEligibilityRequest:
      type: object
      required:
        - citizen_id
        - scheme_ids
      properties:
        citizen_id:
          type: string
          format: uuid
        scheme_ids:
          type: array
          items:
            type: string
            format: uuid
    BatchEligibilityResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EligibilityResponse"

    # Application Schemas
    ApplicationCreate:
      type: object
      required:
        - citizen_id
        - scheme_id
        - form_data
      properties:
        citizen_id:
          type: string
          format: uuid
        scheme_id:
          type: string
          format: uuid
        form_data:
          type: object
        documents_submitted:
          type: array
          items:
            type: string
            format: uuid
    ApplicationOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        citizen_id:
          type: string
          format: uuid
        scheme_id:
          type: string
          format: uuid
        form_data:
          type: object
        documents_submitted:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [draft, submitted, under_review, approved, rejected, needs_info]
        ai_summary:
          type: string
          nullable: true
        government_ref_id:
          type: string
          nullable: true
        rejection_reason:
          type: string
          nullable: true
        processed_by:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApplicationUpdate:
      type: object
      properties:
        form_data:
          type: object
        documents_submitted:
          type: array
          items:
            type: string
            format: uuid
    ApplicationReview:
      type: object
      properties:
        ai_summary:
          type: string
    ApplicationApprove:
      type: object
      properties:
        government_ref_id:
          type: string
    ApplicationReject:
      type: object
      required:
        - rejection_reason
      properties:
        rejection_reason:
          type: string
    BulkApproveRequest:
      type: object
      required:
        - application_ids
      properties:
        application_ids:
          type: array
          items:
            type: string
            format: uuid
        government_ref_id:
          type: string

    # Document Schemas
    DocumentUploadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        document_type:
          type: string
        file_size:
          type: integer
        ocr_result:
          $ref: "#/components/schemas/OCRResult"
    DocumentOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        citizen_id:
          type: string
          format: uuid
        document_type:
          type: string
        original_filename:
          type: string
        file_size:
          type: integer
        mime_type:
          type: string
        ocr_extracted_data:
          type: object
          nullable: true
        ocr_confidence:
          type: number
          nullable: true
        ocr_processed_at:
          type: string
          format: date-time
          nullable: true
        verification_status:
          type: string
          enum: [pending, verified, rejected, needs_review]
        verified_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    DocumentList:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentOut"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    DocumentVerifyRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [verified, rejected]
        verified_by:
          type: string
    AutoFillRequest:
      type: object
      required:
        - citizen_id
        - form_fields
      properties:
        citizen_id:
          type: string
          format: uuid
        form_fields:
          type: array
          items:
            type: string
        document_types:
          type: array
          items:
            type: string
    AutoFillResponse:
      type: object
      properties:
        filled_data:
          type: object
        missing_fields:
          type: array
          items:
            type: string
        confidence_score:
          type: number
          format: float
    OCRResult:
      type: object
      properties:
        raw_text:
          type: string
        extracted_fields:
          type: object
        confidence:
          type: number
          format: float
        document_type:
          type: string
        processor_used:
          type: string

    # AI OCR Schemas
    OCRProcessRequest:
      type: object
      required:
        - image_base64
        - document_type
      properties:
        image_base64:
          type: string
        document_type:
          type: string
          enum: [aadhaar, income_certificate, land_record, bank_passbook]
    OCRProcessResponse:
      type: object
      properties:
        document_type:
          type: string
        extracted_fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/OCRField"
        overall_confidence:
          type: number
        needs_review:
          type: boolean
        flags:
          type: array
          items:
            $ref: "#/components/schemas/OCRFlag"
    OCRField:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        confidence:
          type: number
        is_valid:
          type: boolean
    OCRFlag:
      type: object
      properties:
        field:
          type: string
        severity:
          type: string
          enum: [warning, error, critical]
        message:
          type: string
    OCRAnalyzeRequest:
      type: object
      required:
        - document_type
        - ocr_data
        - purpose
      properties:
        document_type:
          type: string
        ocr_data:
          type: object
        purpose:
          type: string
    OCRAnalyzeResponse:
      type: object
      properties:
        analysis:
          type: string
        flags:
          type: array
          items:
            $ref: "#/components/schemas/OCRFlag"
        suggestions:
          type: array
          items:
            type: string
        overall_confidence:
          type: number

    # Grievance Schemas
    GrievanceCreate:
      type: object
      required:
        - citizen_id
        - category
        - subject
        - description
      properties:
        citizen_id:
          type: string
          format: uuid
        category:
          type: string
          enum: [scheme_related, document_issue, payment_delay, staff_behavior, technical, other]
        department:
          type: string
        subject:
          type: string
          maxLength: 200
        description:
          type: string
        original_language:
          type: string
          example: "hi"
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
    GrievanceOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        citizen_id:
          type: string
          format: uuid
        category:
          type: string
        department:
          type: string
          nullable: true
        subject:
          type: string
        description:
          type: string
        original_language:
          type: string
          nullable: true
        priority:
          type: string
        status:
          type: string
          enum: [draft, submitted, under_review, escalated, resolved, closed]
        resolution_notes:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GrievanceUpdate:
      type: object
      properties:
        category:
          type: string
        department:
          type: string
        subject:
          type: string
        description:
          type: string
        priority:
          type: string
    GrievanceDraftRequest:
      type: object
      required:
        - description
      properties:
        description:
          type: string
        category:
          type: string
        original_language:
          type: string
          example: "hi"
    GrievanceDraftResponse:
      type: object
      properties:
        drafted_complaint:
          type: string
        category:
          type: string
        department:
          type: string
        subject:
          type: string
        priority:
          type: string
    ComplaintTrackingOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        grievance_id:
          type: string
          format: uuid
        action:
          type: string
        action_by:
          type: string
          format: uuid
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    # Notification Schemas
    NotificationOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        citizen_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [scheme_alert, application_update, document_verification, grievance_update, general]
        title:
          type: string
        body:
          type: string
        metadata:
          type: object
          nullable: true
        is_read:
          type: boolean
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    NotificationPreferenceOut:
      type: object
      properties:
        citizen_id:
          type: string
          format: uuid
        push_enabled:
          type: boolean
        sms_enabled:
          type: boolean
        whatsapp_enabled:
          type: boolean
        email_enabled:
          type: boolean
        scheme_alerts:
          type: boolean
        application_updates:
          type: boolean
        grievance_updates:
          type: boolean
        promotional:
          type: boolean
        quiet_hours_start:
          type: string
          nullable: true
        quiet_hours_end:
          type: string
          nullable: true
    NotificationPreferenceUpdate:
      type: object
      properties:
        push_enabled:
          type: boolean
        sms_enabled:
          type: boolean
        whatsapp_enabled:
          type: boolean
        email_enabled:
          type: boolean
        scheme_alerts:
          type: boolean
        application_updates:
          type: boolean
        grievance_updates:
          type: boolean
        promotional:
          type: boolean
        quiet_hours_start:
          type: string
          nullable: true
        quiet_hours_end:
          type: string
          nullable: true
    NotificationSendRequest:
      type: object
      required:
        - citizen_id
        - type
        - title
        - body
      properties:
        citizen_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [scheme_alert, application_update, document_verification, grievance_update, general]
        title:
          type: string
          maxLength: 200
        body:
          type: string
        delivery_channel:
          type: string
          enum: [in_app, sms, whatsapp, push, all]
          default: in_app
        metadata:
          type: object
    NotificationSendResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        delivery_status:
          type: string
          enum: [sent, failed]
    BulkSendRequest:
      type: object
      required:
        - citizen_ids
        - type
        - title
        - body
      properties:
        citizen_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 1000
        type:
          type: string
        title:
          type: string
        body:
          type: string
        metadata:
          type: object
    TemplateCreate:
      type: object
      required:
        - name
        - type
        - title_template
        - body_template
        - language
      properties:
        name:
          type: string
        type:
          type: string
        title_template:
          type: string
        body_template:
          type: string
        variables:
          type: array
          items:
            type: string
        language:
          type: string
          example: "hi"
        channels:
          type: array
          items:
            type: string
    TemplateOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        title_template:
          type: string
        body_template:
          type: string
        variables:
          type: array
          items:
            type: string
        language:
          type: string
        channels:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
    TemplateUpdate:
      type: object
      properties:
        title_template:
          type: string
        body_template:
          type: string
        variables:
          type: array
          items:
            type: string
        channels:
          type: array
          items:
            type: string

    # AI Chat Schemas
    ChatRequest:
      type: object
      required:
        - message
        - language
      properties:
        conversation_id:
          type: string
          nullable: true
        citizen_id:
          type: string
          nullable: true
        message:
          type: string
          minLength: 1
          maxLength: 2000
        language:
          type: string
          example: "hi"
        dialect:
          type: string
          nullable: true
    ChatResponse:
      type: object
      properties:
        response:
          type: string
        conversation_id:
          type: string
        suggested_replies:
          type: array
          items:
            type: string
        schemes:
          type: array
          items:
            type: object
          nullable: true
        intent:
          type: string
    ConversationOut:
      type: object
      properties:
        id:
          type: string
        citizen_id:
          type: string
        language:
          type: string
        dialect:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        message_count:
          type: integer
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
    ConversationListOut:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/ConversationOut"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    # Voice Schemas
    VoiceStartRequest:
      type: object
      required:
        - citizen_id
        - language
      properties:
        citizen_id:
          type: string
        language:
          type: string
        dialect:
          type: string
    VoiceStartResponse:
      type: object
      properties:
        session_id:
          type: string
        expires_in:
          type: integer
          example: 300
    VoiceChunkRequest:
      type: object
      required:
        - session_id
        - audio_base64
      properties:
        session_id:
          type: string
        audio_base64:
          type: string
        encoding:
          type: string
          default: "LINEAR16"
        sample_rate:
          type: integer
          default: 16000
    VoiceChunkResponse:
      type: object
      properties:
        transcript:
          type: string
        audio_response_base64:
          type: string
          nullable: true
        is_final:
          type: boolean
        suggested_actions:
          type: array
          items:
            type: string
    VoiceEndResponse:
      type: object
      properties:
        session_id:
          type: string
        duration:
          type: integer
        message_count:
          type: integer
        summary:
          type: string

    # Translate Schemas
    TranslateRequest:
      type: object
      required:
        - text
        - target_language
      properties:
        text:
          type: string
        target_language:
          type: string
          example: "hi"
        source_language:
          type: string
          nullable: true
    TranslateResponse:
      type: object
      properties:
        translated_text:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        confidence:
          type: number
          format: float
    DetectRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
    DetectResponse:
      type: object
      properties:
        language:
          type: string
        confidence:
          type: number
        dialect:
          type: string
          nullable: true

    # Analytics Schemas
    OverviewKPIs:
      type: object
      properties:
        total_citizens:
          type: integer
        total_applications:
          type: integer
        total_schemes:
          type: integer
        total_grievances:
          type: integer
        approval_rate:
          type: number
          format: float
        avg_processing_time:
          type: number
          format: float
        active_users_today:
          type: integer
        ai_interactions_total:
          type: integer
    RealtimeMetrics:
      type: object
      properties:
        active_sessions:
          type: integer
        applications_today:
          type: integer
        grievances_today:
          type: integer
        ai_queries_today:
          type: integer
        documents_uploaded_today:
          type: integer
        api_requests_per_minute:
          type: integer
    TrendDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        metric:
          type: string
        value:
          type: number
    SchemeAnalytics:
      type: object
      properties:
        scheme_id:
          type: string
        scheme_name:
          type: string
        category:
          type: string
        total_applications:
          type: integer
        approval_rate:
          type: number
        avg_processing_time_days:
          type: number
        benefits_disbursed:
          type: number
    SchemeDeepAnalytics:
      type: object
      properties:
        scheme_id:
          type: string
        scheme_name:
          type: string
        monthly_applications:
          type: array
          items:
            type: object
        demographic_breakdown:
          type: object
        rejection_reasons:
          type: array
          items:
            type: object
        processing_time_distribution:
          type: object
    GeoBreakdown:
      type: object
      properties:
        location:
          type: string
        total_citizens:
          type: integer
        total_applications:
          type: integer
        total_schemes:
          type: integer
        approval_rate:
          type: number
    GeoHeatmapPoint:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        intensity:
          type: number
        label:
          type: string
    AIMetrics:
      type: object
      properties:
        total_conversations:
          type: integer
        total_messages:
          type: integer
        avg_session_duration_seconds:
          type: number
        intent_distribution:
          type: object
        language_distribution:
          type: object
        user_satisfaction_score:
          type: number
    LanguageStats:
      type: object
      properties:
        language:
          type: string
        conversation_count:
          type: integer
        message_count:
          type: integer
        percentage:
          type: number
    ExportRequest:
      type: object
      required:
        - format
        - sections
      properties:
        format:
          type: string
          enum: [csv, json, xlsx]
        sections:
          type: array
          items:
            type: string
            enum: [overview, schemes, geo, ai]
        date_from:
          type: string
          format: date
          nullable: true
        date_to:
          type: string
          format: date
          nullable: true
    ExportResponse:
      type: object
      properties:
        export_id:
          type: string
        status:
          type: string
          enum: [processing, completed, failed]
        format:
          type: string
        download_url:
          type: string
          nullable: true
        expires_at:
          type: string
        created_at:
          type: string
    ExportStatus:
      type: object
      properties:
        export_id:
          type: string
        status:
          type: string
        progress:
          type: integer
        download_url:
          type: string
          nullable: true
        expires_at:
          type: string
        error:
          type: string
          nullable: true

