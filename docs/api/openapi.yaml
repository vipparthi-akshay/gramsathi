  - name: Eligibility
    description: Eligibility checking engine
  - name: Applications
    description: Scheme application management
  - name: Documents
    description: Document upload and management
  - name: Citizen Documents
    description: Citizen-specific document operations
  - name: OCR Processing
    description: OCR document processing endpoints
  - name: Grievances
    description: Grievance filing and tracking
  - name: Notifications
    description: Notification management
  - name: Notification Templates
    description: Notification template management
  - name: AI Chat
    description: AI-powered multilingual chat assistant
  - name: AI Voice
    description: Voice-based AI interaction
  - name: AI Translation
    description: Language translation services
  - name: AI OCR
    description: AI-powered document OCR analysis
  - name: Analytics Overview
    description: Dashboard KPIs and metrics
  - name: Scheme Analytics
    description: Scheme-level analytics
  - name: Geographic Analytics
    description: Location-based analytics
  - name: AI Analytics
