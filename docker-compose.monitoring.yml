# GramSathi AI — Monitoring Stack (Docker Compose)
# Usage: docker compose -f docker-compose.monitoring.yml -f docker-compose.prod.yml up -d

version: "3.9"

networks:
  gramsathi-net:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-data:
  tempo-data:

services:
  # ─── Metrics ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: gramsathi-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=50GB"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/rules/:/etc/prometheus/rules/:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 2G

  # ─── Alerting ───────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: gramsathi-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./docker/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Visualisation ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: gramsathi-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_LDAP_ENABLED: "false"
      GF_SERVER_ROOT_URL: https://monitor.gramsathi.ai
      GF_UNIFIED_ALERTING_ENABLED: "true"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./docker/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Logging ────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: gramsathi-loki
    command:
      - "-config.file=/etc/loki/loki.yml"
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 1G

  promtail:
    image: grafana/promtail:2.9.4
    container_name: gramsathi-promtail
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    volumes:
      - ./docker/monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Tracing ────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.3.1
    container_name: gramsathi-tempo
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    ports:
      - "127.0.0.1:4317:4317"  # OTLP gRPC
      - "127.0.0.1:4318:4318"  # OTLP HTTP
      - "127.0.0.1:3200:3200"  # Tempo query
    volumes:
      - ./docker/monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/tmp/tempo
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Infrastructure Monitoring ──────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: gramsathi-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    pid: host
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - host

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: gramsathi-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 256M
    profiles:
      - host

  # ─── Uptime Monitoring ──────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: gramsathi-uptime
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./docker/monitoring/uptime-kuma-data:/app/data
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 256M
    profiles:
      - uptime

  # ─── Synthetic Monitoring ───────────────────────────
  checkly-agent:
    image: checkly/agent:latest
    container_name: gramsathi-checkly-agent
    environment:
      CHECKLY_API_KEY: ${CHECKLY_API_KEY}
      CHECKLY_ACCOUNT_ID: ${CHECKLY_ACCOUNT_ID}
    restart: unless-stopped
    networks:
      - gramsathi-net
    profiles:
      - synthetic

  # ─── Database Monitoring ───────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: gramsathi-pg-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://gramsathi:${DB_PASSWORD}@postgres:5432/gramsathi?sslmode=disable
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - db

  redis-exporter:
    image: oliver006/redis_exporter:v1.57.0
    container_name: gramsathi-redis-exporter
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_ADDR: redis:6379
    restart: unless-stopped
    networks:
      - gramsathi-net
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - db
