name: Deploy to Development

on:
  push:
    branches: [develop]

env:
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: gramsathi
  GCP_PROJECT_ID: gramsathi-dev
  GKE_CLUSTER: gramsathi-dev-cluster
  GKE_ZONE: us-central1-a
  KUSTOMIZE_DIR: infrastructure/k8s/overlays/dev
  TF_DIR: infrastructure/terraform/environments/dev

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_environment: dev

  deploy-services:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          path: /tmp

      - name: Set image tags in kustomize
        working-directory: ${{ env.KUSTOMIZE_DIR }}
        run: |
          IMAGE_TAG=$(cat /tmp/image-tag.txt)
          kustomize edit set image \
            auth-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/auth-service:$IMAGE_TAG \
            citizen-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/citizen-service:$IMAGE_TAG \
            ai-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/ai-service:$IMAGE_TAG \
            scheme-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/scheme-service:$IMAGE_TAG \
            document-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/document-service:$IMAGE_TAG \
            grievance-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/grievance-service:$IMAGE_TAG \
            notification-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/notification-service:$IMAGE_TAG \
            analytics-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/analytics-service:$IMAGE_TAG \
            citizen-web=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/citizen-web:$IMAGE_TAG \
            admin-web=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/admin-web:$IMAGE_TAG

      - name: Deploy to GKE
        working-directory: ${{ env.KUSTOMIZE_DIR }}
        run: |
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/auth-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/citizen-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/ai-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/scheme-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/document-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/grievance-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/notification-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/analytics-service -n gramsathi --timeout=5m
          kubectl rollout status deployment/citizen-web -n gramsathi --timeout=5m
          kubectl rollout status deployment/admin-web -n gramsathi --timeout=5m

  run-migrations:
    runs-on: ubuntu-latest
    needs: deploy-services
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Run database migrations
        run: |
          kubectl run alembic-runner --image=python:3.11-slim --restart=Never --namespace=gramsathi \
            --command -- bash -c "
              pip install alembic sqlalchemy[asyncio] asyncpg &&
              git clone https://github.com/gram-sathi/gramsathi-ai.git /tmp/repo &&
              cd /tmp/repo/services/migrations &&
              alembic upgrade head
            "
          kubectl wait --for=condition=complete job/alembic-runner --timeout=300s

  smoke-tests:
    runs-on: ubuntu-latest
    needs: run-migrations
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Get LoadBalancer IPs
        run: |
          kubectl get svc -n gramsathi -o jsonpath='{.items[*].status.loadBalancer.ingress[*].ip}' > /tmp/endpoints.txt
          echo "Endpoints: $(cat /tmp/endpoints.txt)"

      - name: Run health check tests
        run: |
          SERVICES=(
            "auth-service"
            "citizen-service"
            "ai-service"
            "scheme-service"
            "document-service"
            "grievance-service"
            "notification-service"
            "analytics-service"
          )
          for SERVICE in "${SERVICES[@]}"; do
            POD_NAME=$(kubectl get pod -n gramsathi -l app=$SERVICE -o jsonpath='{.items[0].metadata.name}')
            if kubectl exec -n gramsathi $POD_NAME -- wget -qO- http://localhost:8000/health; then
              echo "$SERVICE: HEALTHY"
            else
              echo "$SERVICE: UNHEALTHY"
              exit 1
            fi
          done

      - name: Run end-to-end smoke tests
        env:
          BASE_URL: http://$(kubectl get svc -n gramsathi gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        run: |
          python -m pip install httpx
          python -c "
import httpx, sys
BASE = '${{ env.BASE_URL }}'
if not BASE.startswith('http'):
    print('No external endpoint available, skipping e2e tests')
    sys.exit(0)
r = httpx.get(f'{BASE}/health', timeout=30)
assert r.status_code == 200, f'Gateway health failed: {r.text}'
print('Gateway: HEALTHY')
r = httpx.get(f'{BASE}/api/v1/health', timeout=30)
assert r.status_code == 200, f'API health failed: {r.text}'
print('API: HEALTHY')
"
