name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
      run_migrations:
        description: "Run database migrations"
        required: false
        default: true
        type: boolean

env:
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: gramsathi
  GCP_PROJECT_ID: gramsathi-prod
  GKE_CLUSTER: gramsathi-prod-cluster
  GKE_ZONE: us-central1-a
  KUSTOMIZE_DIR: infrastructure/k8s/overlays/prod
  IMAGE_TAG: ${{ inputs.image_tag }}

jobs:
  canary-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://gramsathi.ai
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy canary (10% traffic)
        run: |
          kubectl apply -f infrastructure/k8s/overlays/prod/canary/
          kubectl rollout status deployment -n gramsathi -l canary=true --timeout=5m

      - name: Verify canary deployment
        run: |
          CANARY_COUNT=$(kubectl get pods -n gramsathi -l canary=true -o json | jq '.items | length')
          echo "Canary pods: $CANARY_COUNT"
          for POD in $(kubectl get pods -n gramsathi -l canary=true -o name); do
            if ! kubectl exec -n gramsathi $POD -- wget -qO- http://localhost:8000/health; then
              echo "Canary pod $POD failed health check"
              exit 1
            fi
          done

  canary-verify:
    runs-on: ubuntu-latest
    needs: canary-deploy
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Run smoke tests on canary
        run: |
          CANARY_URL=$(kubectl get svc -n gramsathi canary-gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          python -m pip install httpx
          python -c "
import httpx, sys, time
BASE = f'http://$CANARY_URL'
for i in range(30):
    try:
        r = httpx.get(f'{BASE}/health', timeout=10)
        if r.status_code == 200:
            print(f'Canary gateway healthy (attempt {i+1})')
            break
    except Exception as e:
        print(f'Attempt {i+1}: {e}')
    time.sleep(2)
else:
    print('Canary gateway not healthy after 60s')
    sys.exit(1)
"
      - name: Check error rate on canary
        run: |
          python -m pip install httpx
          ERROR_RATE=$(python -c "
import httpx
BASE = 'https://gramsathi.ai'
# Simulate requests to canary route and check error rate
errors = 0
total = 100
for i in range(total):
    try:
        r = httpx.get(f'{BASE}/health', timeout=10, headers={'X-Canary': 'true'})
        if r.status_code >= 500:
            errors += 1
    except Exception:
        errors += 1
rate = (errors / total) * 100
print(f'Canary error rate: {rate:.3f}%')
if rate >= 0.1:
    print('ERROR: Canary error rate exceeds 0.1% threshold')
    exit(1)
else:
    print('Canary error rate within acceptable threshold')
")
          echo "$ERROR_RATE"

  full-rollout:
    runs-on: ubuntu-latest
    needs: canary-verify
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Full rollout to 100%
        run: |
          kubectl apply -f infrastructure/k8s/overlays/prod/
          kubectl rollout status deployment -n gramsathi --all --timeout=10m

      - name: Remove canary resources
        run: |
          kubectl delete -f infrastructure/k8s/overlays/prod/canary/ --ignore-not-found

  post-deploy:
    runs-on: ubuntu-latest
    needs: full-rollout
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Run database migrations
        if: ${{ inputs.run_migrations }}
        run: |
          kubectl run alembic-runner --image=python:3.11-slim --restart=Never --namespace=gramsathi \
            --command -- bash -c "
              pip install alembic sqlalchemy[asyncio] asyncpg &&
              git clone --depth 1 --branch main https://github.com/gram-sathi/gramsathi-ai.git /tmp/repo &&
              cd /tmp/repo/services/migrations &&
              alembic upgrade head
            "
          kubectl wait --for=condition=complete job/alembic-runner --timeout=300s

      - name: Verify all services healthy
        run: |
          SERVICES=(
            "auth-service" "citizen-service" "ai-service" "scheme-service"
            "document-service" "grievance-service" "notification-service"
            "analytics-service" "citizen-web" "admin-web"
          )
          for SERVICE in "${SERVICES[@]}"; do
            POD_NAME=$(kubectl get pod -n gramsathi -l app=$SERVICE -o jsonpath='{.items[0].metadata.name}')
            if kubectl exec -n gramsathi $POD_NAME -- wget -qO- http://localhost:8000/health; then
              echo "$SERVICE: HEALTHY"
            else
              echo "$SERVICE: UNHEALTHY"
              exit 1
            fi
          done

      - name: Notify deployment success
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"text\": \"Production deployment of gramsathi-ai:${{ env.IMAGE_TAG }} completed successfully\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }} || true
