name: Security Scanning

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: gramsathi-prod
  PYTHON_VERSION: "3.11"

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy full repo scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-repo-results.sarif
          category: trivy-repo

      - name: Upload Trivy config results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-*.sarif

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: gramsathi-ai
          path: .
          format: SARIF
          args: >
            --failOnCVSS 7
            --enableRetired
            --suppression .github/security/dependency-suppressions.xml

      - name: Upload dependency check results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.depcheck.outputs.sarif }}
          category: dependency-check

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ${{ steps.depcheck.outputs.sarif }}

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Generate secret scan report
        if: always()
        run: |
          echo "Secret scan completed at $(date)" > /tmp/secret-scan-report.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-report
          path: /tmp/secret-scan-report.txt

  report:
    runs-on: ubuntu-latest
    needs: [trivy-scan, dependency-check, secret-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/scan-reports

      - name: Generate consolidated security report
        run: |
          python -c "
import json, os, glob

report = {
    'project': 'gramsathi-ai',
    'scan_date': '${{ github.event.repository.updated_at }}',
    'workflow_run': '${{ github.run_id }}',
    'summary': {
        'trivy': 'completed',
        'dependency_check': 'completed',
        'secret_scan': 'completed'
    },
    'artifacts': []
}

reports_dir = '/tmp/scan-reports'
for root, dirs, files in os.walk(reports_dir):
    for f in files:
        path = os.path.join(root, f)
        size = os.path.getsize(path)
        report['artifacts'].append({
            'file': f,
            'size_bytes': size,
            'path': path
        })

os.makedirs('/tmp/consolidated-report', exist_ok=True)
with open('/tmp/consolidated-report/security-summary.json', 'w') as f:
    json.dump(report, f, indent=2)

print(f'Consolidated report generated with {len(report[\"artifacts\"])} artifacts')
"
      - uses: actions/upload-artifact@v4
        with:
          name: consolidated-security-report
          path: /tmp/consolidated-report/

      - name: Upload security report to Cloud Storage
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: /tmp/consolidated-report
          destination: gramsathi-security-reports/${{ github.run_id }}/
          credentials: ${{ secrets.GCP_SA_KEY_PROD }}
