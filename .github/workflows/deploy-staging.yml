name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (leave empty for latest)"
        required: false
        type: string
      run_load_tests:
        description: "Run k6 load tests"
        required: false
        default: true
        type: boolean

env:
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: gramsathi
  GCP_PROJECT_ID: gramsathi-staging
  GKE_CLUSTER: gramsathi-staging-cluster
  GKE_ZONE: us-central1-a
  KUSTOMIZE_DIR: infrastructure/k8s/overlays/staging
  TF_DIR: infrastructure/terraform/environments/staging
  IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_environment: staging

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Set image tags in kustomize
        working-directory: ${{ env.KUSTOMIZE_DIR }}
        run: |
          kustomize edit set image \
            auth-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/auth-service:${{ env.IMAGE_TAG }} \
            citizen-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/citizen-service:${{ env.IMAGE_TAG }} \
            ai-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/ai-service:${{ env.IMAGE_TAG }} \
            scheme-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/scheme-service:${{ env.IMAGE_TAG }} \
            document-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/document-service:${{ env.IMAGE_TAG }} \
            grievance-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/grievance-service:${{ env.IMAGE_TAG }} \
            notification-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/notification-service:${{ env.IMAGE_TAG }} \
            analytics-service=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/analytics-service:${{ env.IMAGE_TAG }} \
            citizen-web=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/citizen-web:${{ env.IMAGE_TAG }} \
            admin-web=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/admin-web:${{ env.IMAGE_TAG }}

      - name: Deploy to GKE
        working-directory: ${{ env.KUSTOMIZE_DIR }}
        run: |
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment -n gramsathi --all --timeout=5m

      - name: Run database migrations
        run: |
          kubectl run alembic-runner --image=python:3.11-slim --restart=Never --namespace=gramsathi \
            --command -- bash -c "
              pip install alembic sqlalchemy[asyncio] asyncpg &&
              git clone --depth 1 --branch staging https://github.com/gram-sathi/gramsathi-ai.git /tmp/repo &&
              cd /tmp/repo/services/migrations &&
              alembic upgrade head
            "
          kubectl wait --for=condition=complete job/alembic-runner --timeout=300s

  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest httpx

      - name: Run integration tests
        env:
          STAGING_BASE_URL: https://staging.gramsathi.ai
        run: |
          python -m pytest tests/integration/ -v --tb=long

  load-tests:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ inputs.run_load_tests }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/load-test.js
          flags: --out json=/tmp/k6-output.json

      - name: Check error rate
        run: |
          ERROR_RATE=$(python -c "
import json
with open('/tmp/k6-output.json') as f:
    lines = f.readlines()
for line in lines:
    if '\"type\":\"Point\"' in line:
        continue
    if '\"type\":\"Summary\"' in line:
        data = json.loads(line)
        checks = data.get('metrics', {}).get('checks', {}).get('passes', 0) or 0
        total = data.get('metrics', {}).get('checks', {}).get('passes', 0) + data.get('metrics', {}).get('checks', {}).get('fails', 0) or 1
        error_rate = (1 - checks / total) * 100
        print(f'Error rate: {error_rate:.2f}%')
        if error_rate > 5:
            print('Error rate exceeds 5% threshold')
            exit(1)
        else:
            print('Error rate within acceptable threshold')
")
          echo "$ERROR_RATE"

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: /tmp/k6-output.json
