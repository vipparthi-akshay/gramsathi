apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gramsathi

commonLabels:
  environment: dev

namePrefix: dev-
nameSuffix: ""

bases:
  - ../../base

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: auth-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: ai-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: gramsathi-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: auth-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: ai-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: application-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: document-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: gramsathi-ingress
    patch: |-
      - op: replace
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1cors-allow-origin
        value: "*"
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.dev.gramsathi.ai
      - op: replace
        path: /spec/rules/0/host
        value: api.dev.gramsathi.ai
      - op: replace
        path: /spec/tls/0/secretName
        value: gramsathi-dev-tls

patchesStrategicMerge:
  - configmap-patch.yaml

images:
  - name: gramsathi
    newTag: dev-latest
  - name: gramsathi-ai
    newTag: dev-latest
