apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gramsathi

commonLabels:
  environment: prod

bases:
  - ../../base

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: auth-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: auth-service
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: ai-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: ai-service
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "4"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "8Gi"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: gramsathi-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: application-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: document-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: user-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: translation-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: notification-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: analytics-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: auth-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: ai-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 30
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: application-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 25
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: document-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: gramsathi-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.gramsathi.ai
      - op: replace
        path: /spec/rules/0/host
        value: api.gramsathi.ai
      - op: replace
        path: /spec/tls/0/secretName
        value: gramsathi-prod-tls

patchesStrategicMerge:
  - configmap-patch.yaml
