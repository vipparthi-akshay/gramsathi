groups:
  - name: gramsathi-service-alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: |
          up{job="gramsathi"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Service {{ $labels.service }} in namespace {{ $labels.kubernetes_namespace }} has been down for more than 1 minute."
          action: "Check the pod status and logs: kubectl get pods -n {{ $labels.kubernetes_namespace }} | grep {{ $labels.service }}"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{job="gramsathi", status=~"5.."}[5m])) / sum(rate(http_requests_total{job="gramsathi"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate on {{ $labels.service }} is {{ $value | humanizePercentage }} which exceeds 5% threshold."
          action: "Check recent logs and metrics for error patterns. Investigate if a deployment caused the issue."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="gramsathi"}[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "P95 latency on {{ $labels.service }} is {{ $value | humanizeDuration }} which exceeds 2s threshold."
          action: "Check if there are resource constraints or if the database/Redis is slow."

      - alert: HighCPUUsage
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="gramsathi"}[5m])) by (pod) / sum(container_spec_cpu_quota{namespace="gramsathi"}/container_spec_cpu_period{namespace="gramsathi"}) by (pod) > 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} CPU usage is {{ $value | humanizePercentage }}."
          action: "Consider increasing CPU limits or adding more replicas."

      - alert: HighMemoryUsage
        expr: |
          sum(container_memory_working_set_bytes{namespace="gramsathi"}) by (pod, container) / sum(container_spec_memory_limit_bytes{namespace="gramsathi"}) by (pod, container) > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} memory usage is {{ $value | humanizePercentage }}."
          action: "Check for memory leaks or increase memory limits."

      - alert: HighDiskUsage
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Low disk space on node {{ $labels.node }}"
          description: "Node {{ $labels.node }} has only {{ $value | humanize }}% disk space remaining."
          action: "Clean up disk space or increase node disk size."

  - name: gramsathi-database-alerts
    interval: 30s
    rules:
      - alert: DatabaseConnectionHigh
        expr: |
          pg_stat_database_numbackends > 400
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High database connections"
          description: "Database has {{ $value }} active connections."
          action: "Check connection pooling configuration and application connection management."

      - alert: DatabaseReplicaLag
        expr: |
          pg_replication_lag > 30
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database replication lag"
          description: "Read replica has {{ $value }} seconds of replication lag."
          action: "Check replica health and network connectivity."

  - name: gramsathi-redis-alerts
    interval: 30s
    rules:
      - alert: RedisCacheHitRateLow
        expr: |
          rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) < 0.8
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Redis cache hit rate low"
          description: "Redis cache hit rate is {{ $value | humanizePercentage }}."
          action: "Review caching strategy and ensure hot keys are being cached properly."

      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."
          action: "Consider increasing Redis memory or reviewing memory policies."

  - name: gramsathi-ai-alerts
    interval: 30s
    rules:
      - alert: AIModelInferenceErrors
        expr: |
          rate(ai_inference_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: ml
        annotations:
          summary: "AI inference errors increasing"
          description: "AI inference error rate is {{ $value | humanize }} per second."
          action: "Check model health and GPU availability."

      - alert: AIModelLatencyHigh
        expr: |
          histogram_quantile(0.95, rate(ai_inference_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "AI inference latency high"
          description: "P95 inference latency is {{ $value | humanizeDuration }}."
          action: "Check GPU utilization and model batching configuration."

      - alert: GPUNotAvailable
        expr: |
          count(kube_pod_container_resource_requests{resource="nvidia.com/gpu", namespace="gramsathi"}) > 0
        for: 1m
        labels:
          severity: critical
          team: ml
        annotations:
          summary: "GPU pods without GPU nodes"
          description: "There are pods requesting GPUs but may not have them scheduled."
          action: "Check GPU node pool health and node availability."

  - name: gramsathi-business-alerts
    interval: 60s
    rules:
      - alert: HighApplicationFailureRate
        expr: |
          rate(applications_failed_total[30m]) / rate(applications_submitted_total[30m]) > 0.1
        for: 10m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "High application failure rate"
          description: "Application failure rate is {{ $value | humanizePercentage }} in the last 30 minutes."
          action: "Investigate application submission pipeline and downstream integrations."

      - alert: BenefitsDisbursementAnomaly
        expr: |
          abs(delta(benefits_disbursed_total[1h])) / benefits_disbursed_total[1h] offset 1h > 0.5
        for: 15m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Benefits disbursement anomaly"
          description: "Benefits disbursement rate has changed by {{ $value | humanizePercentage }} compared to the previous hour."
          action: "Verify payment gateway and disbursement pipeline."
