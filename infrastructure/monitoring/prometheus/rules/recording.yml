groups:
  - name: gramsathi-recording-rules
    interval: 60s
    rules:
      - record: service:error_rate_5m
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service)

      - record: service:request_rate_5m
        expr: |
          sum(rate(http_requests_total[5m])) by (service)

      - record: service:latency_p50_5m
        expr: |
          histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))

      - record: service:latency_p95_5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))

      - record: service:latency_p99_5m
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))

      - record: cluster:cpu_utilization
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="gramsathi"}[5m])) / sum(machine_cpu_cores)

      - record: cluster:memory_utilization
        expr: |
          sum(container_memory_working_set_bytes{namespace="gramsathi"}) / sum(machine_memory_bytes)

      - record: namespace:pod_count
        expr: |
          count(kube_pod_status_phase{phase="Running", namespace="gramsathi"})

      - record: ai:inference_rate_5m
        expr: |
          sum(rate(ai_inferences_total[5m])) by (model, language)

      - record: ai:token_usage_rate_5m
        expr: |
          sum(rate(ai_tokens_total[5m])) by (type)

      - record: db:connection_utilization
        expr: |
          pg_stat_database_numbackends / 500

      - record: redis:hit_rate_5m
        expr: |
          rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

      - record: business:citizens_onboarded_daily
        expr: |
          sum(increase(citizens_onboarded_total[24h]))

      - record: business:applications_per_scheme
        expr: |
          sum(rate(applications_submitted_total[5m])) by (scheme)

      - record: business:language_distribution
        expr: |
          sum(rate(requests_by_language_total[5m])) by (language)

      - record: business:geographic_distribution
        expr: |
          sum(rate(requests_by_region_total[5m])) by (region)
