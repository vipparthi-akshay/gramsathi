global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@gramsathi.ai'
  smtp_auth_username: 'alerts@gramsathi.ai'
  smtp_auth_password: ''
  smtp_require_tls: true
  slack_api_url: ''
  pagerduty_url: ''

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default'
  group_by:
    - alertname
    - severity
    - team
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - receiver: 'critical-pager'
      match:
        severity: critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 15m

    - receiver: 'slack-warning'
      match:
        severity: warning
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

    - receiver: 'ml-team'
      match:
        team: ml
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    - receiver: 'product-team'
      match:
        team: product
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 4h

    - receiver: 'backend-team'
      match:
        team: backend
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

receivers:
  - name: 'default'
    email_configs:
      - to: 'team@gramsathi.ai'
        send_resolved: true
        headers:
          subject: '[GramSathi] {{ .GroupLabels.alertname }} - {{ .GroupLabels.severity }}'

  - name: 'critical-pager'
    email_configs:
      - to: 'oncall@gramsathi.ai'
        send_resolved: true
        headers:
          subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
        html: |
          <h2>Critical Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Action:</strong> {{ .CommonAnnotations.action }}</p>
          <hr>
          <pre>{{ range .Alerts }}{{ .Annotations.description }}{{ end }}</pre>
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Service:* {{ .GroupLabels.service }}
          *Severity:* {{ .GroupLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Action:* {{ .CommonAnnotations.action }}
          {{ range .Alerts }}
            {{ .Annotations.description }}
          {{ end }}
        color: 'danger'
        fields:
          - title: 'Alert Name'
            value: '{{ .GroupLabels.alertname }}'
            short: true
          - title: 'Severity'
            value: '{{ .GroupLabels.severity }}'
            short: true
          - title: 'Service'
            value: '{{ .GroupLabels.service }}'
            short: true
          - title: 'Team'
            value: '{{ .GroupLabels.team }}'
            short: true

  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Service:* {{ .GroupLabels.service }}
          *Description:* {{ .CommonAnnotations.description }}
        color: 'warning'
        fields:
          - title: 'Alert Name'
            value: '{{ .GroupLabels.alertname }}'
            short: true
          - title: 'Service'
            value: '{{ .GroupLabels.service }}'
            short: true

  - name: 'ml-team'
    slack_configs:
      - channel: '#ml-alerts'
        send_resolved: true
        title: '[ML] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Description:* {{ .CommonAnnotations.description }}
          *Action:* {{ .CommonAnnotations.action }}
        color: '#8B5CF6'
    email_configs:
      - to: 'ml-team@gramsathi.ai'
        send_resolved: true
        headers:
          subject: '[GramSathi ML] {{ .GroupLabels.alertname }}'

  - name: 'product-team'
    slack_configs:
      - channel: '#product-alerts'
        send_resolved: true
        title: '[Product] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Description:* {{ .CommonAnnotations.description }}
        color: '#F59E0B'
    email_configs:
      - to: 'product-team@gramsathi.ai'
        send_resolved: true
        headers:
          subject: '[GramSathi Product] {{ .GroupLabels.alertname }}'

  - name: 'backend-team'
    slack_configs:
      - channel: '#backend-alerts'
        send_resolved: true
        title: '[Backend] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Service:* {{ .GroupLabels.service }}
          *Description:* {{ .CommonAnnotations.description }}
          *Action:* {{ .CommonAnnotations.action }}
        color: '#3B82F6'
    email_configs:
      - to: 'backend-team@gramsathi.ai'
        send_resolved: true
        headers:
          subject: '[GramSathi Backend] {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - service
